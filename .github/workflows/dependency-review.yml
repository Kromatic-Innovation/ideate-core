name: Dependency Review

# Blocks a PR that introduces a vulnerable or disallowed-license dependency. The
# dependency-graph API it reads requires a public repo (or GHAS), so the job is
# guarded to run only when the repository is public. ideate-core is public
# (flipped 2026-07-20) — this check is active.

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          license-check: true
          vulnerability-check: true
