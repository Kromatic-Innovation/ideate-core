name: Secret Scan

# TruffleHog OSS — free on private org repos, no license key required (unlike
# the licensed gitleaks-action). Scans the PR diff on every pull request and the
# full history on a weekly schedule. ci-config only (no deploy surface).

on:
  pull_request:
    branches: [develop]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown
