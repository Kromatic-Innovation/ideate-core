name: Secret Scan

# TruffleHog OSS — free on private org repos, no license key required (unlike
# the licensed gitleaks-action). Scans the PR diff on every pull request and the
# full history on a weekly schedule. ci-config only (no deploy surface).

on:
  pull_request:
    branches: [develop]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1 # v3.88.0
        with:
          extra_args: --results=verified,unknown
