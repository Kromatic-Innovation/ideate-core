name: Release

# Publish ideate-core to the PUBLIC npm registry (Apache-2.0)
# on a v* tag. This is DISTINCT from the internal GitHub Packages publish
# (package.json `publishConfig.registry`): this job deletes that publishConfig
# entry in-CI so the release targets npmjs.org, and publishes with
# `--access public`. npm provenance is enabled when the repo is public
# (provenance requires a public repo); while private it is skipped.
#
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret, no long-lived
# credential anywhere. `id-token: write` below lets npm CLI >=11.5.1 mint a
# short-lived OIDC token and exchange it with the registry at publish time.
# This requires a one-time bootstrap: npm's Trusted Publisher can only be
# attached to a package that already exists, so the FIRST publish for a new
# package must be a manual `npm publish` from a maintainer's logged-in
# machine; every release after that runs through this workflow with zero
# stored secrets. See tickle-stick's release.yml for the working reference
# (confirmed via its CI logs: "Signed provenance statement ... from GitHub
# Actions", no NPM_TOKEN present anywhere).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate with npm publish --dry-run (no real publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  release:
    name: Publish to public npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js (public npm registry, scoped)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          scope: "@kromatic-innovation"
      # Trusted publishing requires npm >= 11.5.1 — Node 20 ships npm 10.x,
      # which signs provenance attestations but doesn't perform the
      # OIDC↔registry token exchange. Pin to the npm 11 line: `npm@latest`
      # is now npm 12, which dropped Node 20 (requires node >=22) and fails
      # this step with EBADENGINE. npm 11.x still supports Node 20 and
      # satisfies the >= 11.5.1 trusted-publishing floor. Mirrors
      # tickle-stick's release.yml (confirmed working since its v0.4.1).
      - name: Upgrade npm to support trusted publishing
        run: |
          npm install -g npm@11
          npm --version
      - name: Test
        run: node --test lib/*.test.mjs
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v${TAG} does not match package.json version ${PKG}"
            exit 1
          fi
          echo "tag v${TAG} matches package.json ${PKG}"
      - name: Route this publish to public npm (not GitHub Packages)
        run: npm pkg delete publishConfig.registry
      - name: Publish
        run: |
          set -euo pipefail
          PROV=""
          if [ "${{ github.event.repository.visibility }}" = "public" ]; then
            PROV="--provenance"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — no publish."
            npm publish --access public --dry-run
          else
            npm publish --access public $PROV
          fi
